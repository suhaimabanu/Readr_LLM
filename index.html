<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>arXiv LLM — Research Analysis</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['Georgia', 'Cambria', '"Times New Roman"', 'Times', 'serif'],
            mono: ['"Courier New"', 'Courier', 'monospace'],
            sans: ['Inter', 'system-ui', 'sans-serif']
          },
          colors: {
            arxiv: {
              red: '#b31b1b', // Classic arXiv red from reference
              borderLight: '#d4d4d8',
              borderDark: '#3f3f46',
              bgLight: '#ffffff',
              bgDark: '#121212'
            }
          }
        }
      }
    }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
  </script>

  <style>
    /* Minimalist Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d4d4d8; }
    .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
    
    /* Academic typography tweaks */
    body { font-family: 'Georgia', serif; }
    .mono-text { font-family: '"Courier New"', Courier, monospace; }
  </style>
</head>
<body class="bg-arxiv-bgLight dark:bg-arxiv-bgDark text-neutral-900 dark:text-neutral-100 h-screen flex flex-col transition-colors duration-200 overflow-hidden text-sm">

  <!-- Top Navigation Header matching reference exactly -->
  <header class="bg-[#b31b1b] text-white px-4 py-1.5 flex justify-between items-center shrink-0 mono-text shadow-sm z-20">
    <div class="flex items-center gap-2">
      <div class="bg-white/20 px-1 rounded text-xs font-bold shadow-inner">a r X i v</div>
      <span class="font-bold opacity-90 text-sm">arXiv.org <span class="font-normal opacity-70 ml-1">></span> Research Analysis</span>
    </div>
    <button onclick="toggleDarkMode()" class="text-xs hover:underline opacity-80 hover:opacity-100 transition-opacity">
      [ toggle dark mode ]
    </button>
  </header>

  <!-- Main 3-Column Layout -->
  <main class="flex flex-1 overflow-hidden w-full">
    
    <!-- LEFT SIDEBAR: References (w-64 = ~256px) -->
    <aside class="w-56 md:w-64 flex flex-col border-r border-arxiv-borderLight dark:border-arxiv-borderDark bg-white dark:bg-[#18181b] shrink-0 z-10">
      <div class="p-2 border-b border-arxiv-borderLight dark:border-arxiv-borderDark font-bold text-base bg-neutral-50 dark:bg-[#1f1f23]">
        References
      </div>
      
      <div class="p-3 border-b border-arxiv-borderLight dark:border-arxiv-borderDark bg-white dark:bg-[#18181b]">
        <!-- Dashed upload button matching reference -->
        <label class="block border-[1.5px] border-dashed border-neutral-400 dark:border-neutral-600 py-1.5 px-2 text-center cursor-pointer hover:bg-neutral-50 dark:hover:bg-neutral-800 transition-colors">
          <span class="text-sm font-semibold text-neutral-700 dark:text-neutral-300">Upload PDF(s)</span>
          <input type="file" id="fileUpload" class="hidden" accept=".pdf,application/pdf" multiple onchange="handleFileUpload(event)">
        </label>
      </div>

      <!-- Uploaded Documents List -->
      <div id="documentList" class="flex-1 overflow-y-auto p-2 flex flex-col gap-1">
        <!-- JS will populate doc items here -->
      </div>
    </aside>

    <!-- CENTER PANEL: Document Viewer (flex-1 expands to take most space) -->
    <section class="flex-1 flex flex-col relative bg-white dark:bg-[#121212]">
      <!-- Header showing active document -->
      <div class="px-3 py-2 border-b border-r border-arxiv-borderLight dark:border-arxiv-borderDark mono-text text-xs text-neutral-600 dark:text-neutral-400 bg-white dark:bg-[#18181b] flex justify-between items-center z-10">
        <span id="activeDocLabel">No document selected</span>
        
        <!-- Subtle pagination controls -->
        <div id="viewerNav" class="hidden flex items-center gap-3">
          <button onclick="prevPage()" class="hover:text-black dark:hover:text-white px-1 disabled:opacity-30">&lt;</button>
          <span>Page <span id="pageNum">0</span> of <span id="pageCount">0</span></span>
          <button onclick="nextPage()" class="hover:text-black dark:hover:text-white px-1 disabled:opacity-30">&gt;</button>
        </div>
      </div>
      
      <!-- Massive Canvas Area -->
      <div class="flex-1 overflow-auto flex justify-center items-start p-4 bg-neutral-50 dark:bg-[#0a0a0a] border-r border-arxiv-borderLight dark:border-arxiv-borderDark relative" id="viewerContainer">
        
        <!-- Loading overlay spinner -->
        <div id="pdfLoadingSpinner" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex-col items-center gap-3 hidden z-10 mono-text">
          <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-[#b31b1b]"></div>
          <p class="text-xs text-neutral-500">Rendering vector page...</p>
        </div>

        <!-- The actual PDF Canvas -->
        <canvas id="pdfCanvas" class="max-w-full shadow-lg border border-neutral-300 dark:border-neutral-800 bg-white hidden"></canvas>
         
        <!-- Placeholder text matching reference -->
        <div id="noPdfSelected" class="absolute inset-0 flex items-end justify-center pb-24 pointer-events-none">
          <p class="text-neutral-400 dark:text-neutral-500 italic text-base max-w-sm text-center">
            Upload and select a research paper to begin analysis.
          </p>
        </div>
      </div>
    </section>

    <!-- RIGHT SIDEBAR: Chat & Analysis (w-80 = ~320px) -->
    <aside class="w-72 md:w-80 lg:w-96 flex flex-col bg-white dark:bg-[#18181b] shrink-0 z-10 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] dark:shadow-none">
      
      <!-- API Key Input Bar -->
      <div class="px-3 py-2 border-b border-arxiv-borderLight dark:border-arxiv-borderDark bg-neutral-50 dark:bg-[#1f1f23] flex items-center gap-2">
        <span class="font-bold text-xs">API Key:</span>
        <input 
          type="password" 
          id="apiKeyInput" 
          placeholder="Enter Gemini 2.5 Flash Key" 
          class="flex-1 px-2 py-0.5 text-xs border border-neutral-300 dark:border-neutral-600 rounded-sm bg-white dark:bg-[#121212] focus:outline-none focus:border-[#b31b1b] mono-text transition-colors"
          oninput="handleApiKeyChange()"
        >
        <div class="w-2.5 h-2.5 rounded-full bg-neutral-300 dark:bg-neutral-600 shadow-inner shrink-0 transition-all duration-300" id="apiStatusDot" title="No API Key entered"></div>
      </div>
      
      <!-- Chat Messages Area -->
      <div id="chatMessages" class="flex-1 overflow-y-auto p-5 space-y-6 flex flex-col">
        <!-- Initial Reference Match Message -->
        <div class="text-center text-neutral-500 dark:text-neutral-400 italic text-sm mt-4">
          Analysis module ready.<br>
          Citations will be provided in [Page X] format.
        </div>
      </div>

      <!-- User Input Area -->
      <div class="p-3 border-t border-arxiv-borderLight dark:border-arxiv-borderDark bg-neutral-50 dark:bg-[#1f1f23]">
        <form onsubmit="handleSendQuery(event)" class="flex flex-col gap-2 relative">
          <textarea 
            id="chatInput" 
            placeholder="Query paper contents..." 
            rows="2"
            class="w-full px-3 py-2 border border-neutral-300 dark:border-neutral-600 rounded bg-white dark:bg-[#121212] text-sm focus:outline-none focus:border-[#b31b1b] resize-none transition-colors"
            onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();handleSendQuery(event);}"
          ></textarea>
          <div class="flex justify-between items-center">
            <span class="text-[10px] text-neutral-400 mono-text">Shift+Enter for newline</span>
            <button type="submit" class="px-4 py-1 bg-[#b31b1b] text-white rounded text-xs font-bold hover:bg-[#8a1515] transition-colors">
              Analyze
            </button>
          </div>
        </form>
      </div>
    </aside>

  </main>

  <script>
    // State Variables
    let darkMode = false; // Default to light mode to match reference initially
    let apiKey = '';
    let documents = []; // Array of { name: '', arrayBuffer: null, textContent: '', totalPages: 0 }
    let currentActiveDocIndex = null;
    let pdfDoc = null;
    let pageNum = 1;
    let pageCount = 0;
    let pageRendering = false;
    let pageNumPending = null;
    let scale = 1.5; // High res scale for better readability in wide center panel
    let validationTimeout = null;

    // Toggle Dark Mode
    function toggleDarkMode() {
      darkMode = !darkMode;
      const html = document.documentElement;
      if (darkMode) {
        html.classList.add('dark');
        html.classList.remove('light');
      } else {
        html.classList.remove('dark');
        html.classList.add('light');
      }
    }

    // Monitor API Key Input & Trigger Real-Time Connection Verification
    function handleApiKeyChange() {
      const input = document.getElementById('apiKeyInput');
      apiKey = input.value.trim();
      const dot = document.getElementById('apiStatusDot');

      if (!apiKey) {
        dot.className = "w-2.5 h-2.5 rounded-full bg-neutral-300 dark:bg-neutral-600 shadow-inner shrink-0 transition-all duration-300";
        dot.title = "No API Key entered";
        clearTimeout(validationTimeout);
        return;
      }

      // Show intermediate "Testing connection" yellow state while user is typing
      dot.className = "w-2.5 h-2.5 rounded-full bg-yellow-500 shadow-[0_0_8px_rgba(234,179,8,0.8)] shrink-0 transition-all duration-300 animate-pulse";
      dot.title = "Validating connectivity...";

      // Debounce key validation to avoid hammering the endpoint while typing
      clearTimeout(validationTimeout);
      validationTimeout = setTimeout(() => {
        validateApiKeyOnline(apiKey);
      }, 750);
    }

    // Actual live endpoint check to ensure the key is fully functional
    async function validateApiKeyOnline(keyToTest) {
      const dot = document.getElementById('apiStatusDot');
      try {
        // Query models listing as a highly reliable, free, metadata GET request
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${keyToTest}`);
        if (response.ok) {
          // Successfully authenticated & verified
          dot.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.9)] shrink-0 transition-all duration-300 animate-none";
          dot.title = "Connected & Validated successfully!";
        } else {
          throw new Error("Invalid API key response");
        }
      } catch (error) {
        // Validation failed
        dot.className = "w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.9)] shrink-0 transition-all duration-300 animate-none";
        dot.title = "Invalid key or unable to connect. Verify your API key.";
      }
    }

    // Handle PDF File Uploads
    async function handleFileUpload(event) {
      const files = event.target.files;
      if (!files.length) return;

      const listContainer = document.getElementById('documentList');

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const docIndex = documents.length;
        
        const docData = {
          name: file.name,
          arrayBuffer: null,
          textContent: '',
          totalPages: 0
        };

        // Create UI item in left sidebar
        const docItem = document.createElement('button');
        docItem.id = `docItem-${docIndex}`;
        docItem.className = `w-full text-left px-2 py-1.5 text-xs border-b border-dashed border-neutral-200 dark:border-neutral-800 hover:bg-neutral-100 dark:hover:bg-neutral-800 truncate transition-colors mono-text`;
        docItem.onclick = () => selectActiveDocument(docIndex);
        docItem.innerText = file.name;
        docItem.title = file.name;
        
        listContainer.appendChild(docItem);

        // Read and parse PDF
        const reader = new FileReader();
        reader.onload = async function() {
          docData.arrayBuffer = this.result;
          try {
            const docObj = await pdfjsLib.getDocument({ data: this.result }).promise;
            docData.totalPages = docObj.numPages;
            
            // Extract text for LLM Context (first 15 pages max to save memory)
            let extractedText = "";
            const pagesToParse = Math.min(docObj.numPages, 15);
            for (let pIdx = 1; pIdx <= pagesToParse; pIdx++) {
              const page = await docObj.getPage(pIdx);
              const textContent = await page.getTextContent();
              const pageStr = textContent.items.map(item => item.str).join(' ');
              extractedText += `--- PAGE ${pIdx} ---\n` + pageStr + "\n\n";
            }
            docData.textContent = extractedText;
            documents[docIndex] = docData;

            // Auto-select if it's the first document
            if (currentActiveDocIndex === null) {
              selectActiveDocument(docIndex);
            }
          } catch (error) {
            console.error("Error parsing PDF text:", error);
            docItem.classList.add('text-red-500');
            docItem.innerText = `[Error] ${file.name}`;
          }
        };
        reader.readAsArrayBuffer(file);
      }
      
      // Reset input so same file can be uploaded again if needed
      event.target.value = '';
    }

    // Switch Active Document
    async function selectActiveDocument(index) {
      if (index === null || !documents[index]) return;

      currentActiveDocIndex = index;
      const doc = documents[index];

      // Update UI highlights
      document.querySelectorAll('[id^="docItem-"]').forEach(item => {
        item.classList.remove('bg-neutral-200', 'dark:bg-neutral-700', 'font-bold');
      });
      const selectedItem = document.getElementById(`docItem-${index}`);
      if (selectedItem) {
        selectedItem.classList.add('bg-neutral-200', 'dark:bg-neutral-700', 'font-bold');
      }

      // Update Center Header
      document.getElementById('activeDocLabel').innerText = doc.name;
      document.getElementById('noPdfSelected').classList.add('hidden');
      document.getElementById('pdfCanvas').classList.remove('hidden');
      document.getElementById('pdfLoadingSpinner').classList.remove('hidden');
      document.getElementById('viewerNav').classList.remove('hidden');

      // Initialize PDF viewer state
      pageNum = 1;
      pageCount = doc.totalPages;
      document.getElementById('pageCount').innerText = pageCount;
      
      try {
        const loadingTask = pdfjsLib.getDocument({ data: doc.arrayBuffer });
        pdfDoc = await loadingTask.promise;
        renderPage(pageNum);
      } catch (err) {
        console.error("PDF Render Error: ", err);
      } finally {
        document.getElementById('pdfLoadingSpinner').classList.add('hidden');
      }
    }

    // Render specific page to canvas
    async function renderPage(num) {
      if (!pdfDoc) return;
      pageRendering = true;
      document.getElementById('pageNum').innerText = num;
      
      // Update button states
      document.querySelector('button[onclick="prevPage()"]').disabled = (num <= 1);
      document.querySelector('button[onclick="nextPage()"]').disabled = (num >= pageCount);

      try {
        const page = await pdfDoc.getPage(num);
        const canvas = document.getElementById('pdfCanvas');
        const ctx = canvas.getContext('2d');
        
        // Calculate scale to fit width reasonably, but default to high res (1.5)
        const viewport = page.getViewport({ scale: scale });
        const dpr = window.devicePixelRatio || 1;
        
        canvas.height = viewport.height * dpr;
        canvas.width = viewport.width * dpr;
        
        // CSS display size
        canvas.style.width = `${viewport.width}px`;
        canvas.style.height = `${viewport.height}px`;
        
        ctx.scale(dpr, dpr);

        const renderContext = {
          canvasContext: ctx,
          viewport: viewport
        };

        await page.render(renderContext).promise;
        pageRendering = false;

        if (pageNumPending !== null) {
          renderPage(pageNumPending);
          pageNumPending = null;
        }
      } catch (error) {
        console.error("Rendering error:", error);
        pageRendering = false;
      }
    }

    function queueRenderPage(num) {
      if (pageRendering) {
        pageNumPending = num;
      } else {
        renderPage(num);
      }
    }

    function prevPage() {
      if (pageNum <= 1) return;
      pageNum--;
      queueRenderPage(pageNum);
    }

    function nextPage() {
      if (pageNum >= pageCount) return;
      pageNum++;
      queueRenderPage(pageNum);
    }

    // Make API Call to Gemini with Exponential Backoff Retries
    async function makeGeminiCall(payload, systemPrompt) {
      if (!apiKey) {
        throw new Error("API Key Missing. Please enter your Gemini API Key.");
      }

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const requestPayload = {
        contents: [{ parts: [{ text: payload }] }],
        systemInstruction: { parts: [{ text: systemPrompt }] }
      };

      let delay = 1000;
      for (let attempt = 1; attempt <= 5; attempt++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestPayload)
          });

          if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error?.message || `HTTP Error ${response.status}`);
          }

          const result = await response.json();
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!text) throw new Error("Empty response from model.");
          return text;
        } catch (err) {
          if (attempt === 5) throw err;
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    }

    // Handle Chat Form Submission
    async function handleSendQuery(event) {
      event.preventDefault();
      const input = document.getElementById('chatInput');
      const queryText = input.value.trim();
      if (!queryText) return;

      // Add user message to UI
      appendChatMessage(queryText, 'user');
      input.value = '';

      // Add loading state message
      const botMsgId = appendChatMessage("Analyzing context...", 'bot', true);

      try {
        let activeDocText = "No document loaded. Answer general knowledge questions.";
        if (currentActiveDocIndex !== null && documents[currentActiveDocIndex]) {
          activeDocText = documents[currentActiveDocIndex].textContent;
        }

        const systemPrompt = `You are "arXiv LLM", a strict, academic AI assistant specialized in explaining complex documents in layman language. 
        Your tone should be professional, concise, and objective.
        CRITICAL: When referencing specific facts from the document, you MUST include a citation using the exact format: [Page X] where X is the page number derived from the "--- PAGE X ---" markers in the provided text stream.
        Format your response cleanly using paragraphs and bullet points if necessary. Avoid overly enthusiastic language.`;

        const payload = `
        DOCUMENT CONTEXT:
        ${activeDocText.substring(0, 25000)} // Send up to ~25k chars
        
        USER QUERY:
        ${queryText}
        `;

        const responseText = await makeGeminiCall(payload, systemPrompt);
        updateChatMessage(botMsgId, responseText);
      } catch (error) {
        updateChatMessage(botMsgId, `<span class="text-red-600 dark:text-red-400 font-bold">System Error:</span> ${error.message}`);
      }
    }

    // Helper to append messages to chat UI
    function appendChatMessage(text, sender, isLoading = false) {
      const chatMessages = document.getElementById('chatMessages');
      const msgId = 'msg-' + Date.now();
      
      const msgWrapper = document.createElement('div');
      msgWrapper.id = msgId;
      msgWrapper.className = `flex flex-col ${sender === 'user' ? 'items-end' : 'items-start'} animate-fade-in`;

      const bubbleClass = sender === 'user'
        ? 'bg-neutral-100 dark:bg-[#27272a] text-neutral-900 dark:text-neutral-100 border border-neutral-200 dark:border-neutral-700'
        : 'bg-white dark:bg-[#121212] text-neutral-800 dark:text-neutral-200 border-l-2 border-[#b31b1b] pl-3 py-1';

      const label = sender === 'user' ? '<span class="text-[10px] text-neutral-400 mb-1 mono-text uppercase">Query</span>' : '<span class="text-[10px] text-[#b31b1b] mb-1 mono-text font-bold uppercase">Analysis</span>';

      msgWrapper.innerHTML = `
        ${label}
        <div class="${bubbleClass} rounded-sm p-2.5 max-w-[95%] text-[13px] leading-relaxed shadow-sm">
          <div class="content-container">
            ${isLoading ? '<span class="animate-pulse italic text-neutral-500">Processing vector streams...</span>' : formatTextToHTML(text)}
          </div>
        </div>
      `;

      chatMessages.appendChild(msgWrapper);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return msgId;
    }

    // Helper to update an existing message (used after loading finishes)
    function updateChatMessage(msgId, text) {
      const msgWrapper = document.getElementById(msgId);
      if (!msgWrapper) return;

      const container = msgWrapper.querySelector('.content-container');
      if (container) {
        container.innerHTML = formatTextToHTML(text);
      }
      
      const chatMessages = document.getElementById('chatMessages');
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Basic markdown to HTML formatter specifically handling [Page X] links
    function formatTextToHTML(text) {
      if (!text) return '';
      let html = text;

      // Escape HTML
      html = html.replace(/</g, '&lt;').replace(/>/g, '&gt;');

      // Handle Bold
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold">$1</strong>');

      // Make [Page X] citations clickable and visually distinct
      html = html.replace(/\[Page\s*(\d+)\]/gi, '<span class="text-[#b31b1b] font-bold cursor-pointer hover:underline mono-text text-xs bg-[#b31b1b]/10 px-1 rounded mx-0.5" onclick="scrollToDocPage($1)" title="Click to view page $1">[Page $1]</span>');

      // Convert newlines to paragraphs/br
      const paragraphs = html.split('\n\n');
      return paragraphs.map(p => {
        // Handle basic lists within paragraphs
        if (p.includes('\n- ') || p.includes('\n* ')) {
          const lines = p.split('\n');
          let listHtml = '<ul class="list-disc pl-5 my-2 space-y-1">';
          let inList = false;
          let outHtml = '';
          
          lines.forEach(line => {
             if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
                inList = true;
                listHtml += `<li>${line.substring(2)}</li>`;
             } else {
                if (inList) {
                   listHtml += '</ul>';
                   outHtml += listHtml;
                   inList = false;
                   listHtml = '<ul class="list-disc pl-5 my-2 space-y-1">';
                }
                outHtml += `${line}<br>`;
             }
          });
          if (inList) outHtml += listHtml + '</ul>';
          return `<p class="mb-2">${outHtml}</p>`;
        }
        return `<p class="mb-2">${p.replace(/\n/g, '<br>')}</p>`;
      }).join('');
    }

    // Function triggered by clicking a citation link
    function scrollToDocPage(targetPage) {
      const parsed = parseInt(targetPage, 10);
      if (parsed >= 1 && parsed <= pageCount) {
        pageNum = parsed;
        queueRenderPage(pageNum);
      }
    }
    
    // Add custom styles for fade-in animation
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
